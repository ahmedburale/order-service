name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Install Java 17 with Maven caching
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      # Run unit tests
      - name: Run tests
        run: ./mvnw test -B

      # Build the Docker image to verify the Dockerfile works
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: order-service:ci

      # Start PostgreSQL and the app, then verify health
      - name: Verify container health
        run: |
          docker network create ci-net
          docker run -d --name postgres --network ci-net \
            -e POSTGRES_DB=orderdb \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            postgres:16-alpine
          sleep 5
          docker run -d --name order-service --network ci-net -p 8080:8080 \
            -e SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/orderdb \
            -e SPRING_DATASOURCE_USERNAME=postgres \
            -e SPRING_DATASOURCE_PASSWORD=postgres \
            order-service:ci
          sleep 30
          curl --fail http://localhost:8080/actuator/health/liveness || exit 1
          docker stop order-service postgres
          docker network rm ci-net